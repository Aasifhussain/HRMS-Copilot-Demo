kind = "web"
previewPath = "/"
title = "Workday Timesheet"
version = "1.0.0"
id = "artifacts/timesheet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20996

[services.development]
run = "pnpm --filter @workspace/timesheet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/timesheet", "run", "build" ]
publicDir = "artifacts/timesheet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20996"
BASE_PATH = "/"
